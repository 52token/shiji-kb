# 混合语义分析实验配置

# 本地模型配置
local_model:
  # 模型类型: ltp (依存文法) / hanlp / qwen (Qwen2.5-7B) / glm (GLM-4-9B)
  type: "ltp"

  # 模型路径 (仅 qwen/glm 需要)
  model_path: null

  # 设备: cuda / cpu
  device: "cpu"

  # 批处理大小 (仅小模型)
  batch_size: 4

  # 最大长度 (仅小模型)
  max_length: 512

# LLM配置
llm:
  # 提供商: anthropic / openai
  provider: "anthropic"

  # API Key (可从环境变量读取)
  api_key: "${ANTHROPIC_API_KEY}"

  # 模型名称
  model: "claude-3-5-sonnet-20241022"

  # 温度参数
  temperature: 0.0

  # 最大token数
  max_tokens: 4096

# 评估配置
evaluation:
  # 参考答案路径
  ground_truth: "data/ground_truth.tagged.md"

  # 评估指标
  metrics:
    - "entity_precision"    # 实体精确率
    - "entity_recall"       # 实体召回率
    - "entity_f1"          # 实体F1
    - "relation_accuracy"  # 关系准确率
    - "text_integrity"     # 原文完整性

# 混合方案配置
hybrid:
  # 本地模型置信度阈值(低于此值交给LLM处理)
  confidence_threshold: 0.8

  # 是否启用LLM review全部结果
  llm_review_all: false

  # LLM只处理的实体类型(其他交给本地模型)
  llm_only_types:
    - "EVENT"      # 事件
    - "RELATION"   # 复杂关系

# 日志配置
logging:
  level: "INFO"
  file: "logs/experiment.log"

# 输出配置
output:
  results_dir: "results"
  save_intermediate: true  # 保存中间结果
  format: "tagged_md"      # 输出格式
